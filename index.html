<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zaruo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#111827;
    color:white;
}

header{
    text-align:center;
    padding:40px;
}

header h1{
    font-size:52px;
}

header p{
    color:#b3b3b3;
    margin-top:10px;
}

.stream{
    width:90%;
    margin:auto;
}

.player{
    position:relative;
    width:100%;
    padding-top:56.25%;
}

.player iframe{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
    border-radius:15px;
}

.socials{
    display:flex;
    justify-content:center;
    gap:20px;
    margin:50px;
    flex-wrap:wrap;
}

.socials a{
    background:#7c3aed;
    color:white;
    text-decoration:none;
    padding:15px 30px;
    border-radius:10px;
    transition:.25s;
}

.socials a:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<header>
<h1>ZARUO</h1>
<p>Content Creator</p>
</header>

<div class="stream">

<div class="player">
<iframe
src="https://player.twitch.tv/?channel=ZaruoTV&parent=hipsherz.github.io"
allowfullscreen>
</iframe>
</div>

</div>

<div class="socials">

<a href="https://twitch.tv/ZaruoTV" target="_blank">Twitch</a>

<a href="https://youtube.com/@ItsZaruo" target="_blank">YouTube</a>

<a href="https://tiktok.com/@ItsZaruo" target="_blank">TikTok</a>

</div>

</body>
</html>
